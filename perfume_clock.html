<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfume Digital Clock</title>
  <style>
    :root {
      --theme-primary: #223056;
      --theme-secondary: #425c90;
      --theme-accent: #f1c58f;
      --page-bg: #ffe0c7;
      --page-bg-deep: #f6c7a3;
      --text-main: #2b211c;
      --text-sub: rgba(43, 33, 28, 0.72);
      --border: rgba(255, 255, 255, 0.28);
      --shadow: 0 24px 60px rgba(118, 77, 46, 0.16);
      --liquid-height: 0%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, system-ui, sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 14% 16%, rgba(255,255,255,0.72), transparent 20%),
        radial-gradient(circle at 84% 18%, color-mix(in srgb, var(--theme-accent) 18%, white), transparent 26%),
        radial-gradient(circle at 50% 120%, color-mix(in srgb, var(--theme-secondary) 12%, transparent), transparent 34%),
        linear-gradient(145deg, var(--page-bg), var(--page-bg-deep));
      transition: background 900ms ease, color 500ms ease;
    }

    .screen {
      position: relative;
      width: min(900px, 96vw);
      min-height: 400px;
      overflow: hidden;
      isolation: isolate;
      border-radius: 34px;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at 14% 18%, rgba(255,255,255,0.22), transparent 24%),
        radial-gradient(circle at 86% 82%, color-mix(in srgb, var(--theme-accent) 14%, white), transparent 22%),
        linear-gradient(160deg,
          color-mix(in srgb, var(--theme-secondary) 42%, rgba(255,255,255,0.14)),
          color-mix(in srgb, var(--theme-primary) 82%, black 8%) 54%,
          color-mix(in srgb, var(--theme-secondary) 74%, black 10%));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02) 26%, rgba(255,255,255,0.04)),
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.10), transparent 22%);
      pointer-events: none;
      z-index: 0;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,0.06);
      pointer-events: none;
      z-index: 0;
    }

    .ambient,
    .ambient::before,
    .ambient::after {
      position: absolute;
      content: "";
      border-radius: 999px;
      pointer-events: none;
      filter: blur(12px);
    }

    .ambient {
      right: -44px;
      top: -70px;
      width: 240px;
      height: 240px;
      background: color-mix(in srgb, var(--theme-accent) 18%, transparent);
      opacity: 0.9;
      animation: floatGlow 11s ease-in-out infinite;
    }

    .ambient::before {
      left: -520px;
      top: 180px;
      width: 220px;
      height: 220px;
      background: color-mix(in srgb, var(--theme-secondary) 18%, white 18%);
      opacity: 0.7;
      animation: floatGlow 13s ease-in-out infinite reverse;
    }

    .ambient::after {
      left: -120px;
      top: 260px;
      width: 160px;
      height: 160px;
      background: color-mix(in srgb, var(--theme-accent) 16%, transparent);
      opacity: 0.65;
      animation: floatGlow 12s ease-in-out infinite;
    }

    .content {
      position: relative;
      z-index: 3;
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      min-height: 400px;
    }

    .panel {
      position: relative;
      padding: 28px;
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,0.10), transparent 72%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-sub);
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--theme-accent));
    }

    .time-wrap {
      display: grid;
      gap: 10px;
    }

    .time {
      font-size: clamp(2.7rem, 7.8vw, 5.8rem);
      line-height: 0.94;
      letter-spacing: 0.06em;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      word-break: keep-all;
    }

    .date-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
    }

    .date,
    .weekday {
      font-size: clamp(1rem, 2vw, 1.12rem);
      font-weight: 700;
      color: var(--text-sub);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .weekday::before {
      content: "•";
      margin-right: 12px;
      opacity: 0.65;
    }

    .details {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 18px 18px 16px;
      border: 1px solid rgba(255,255,255,0.48);
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(255,255,255,0.42));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.42),
        0 14px 28px rgba(79, 48, 30, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto -18px -24px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--theme-accent) 16%, transparent);
      filter: blur(10px);
      pointer-events: none;
    }

    .floral-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.84), rgba(255,255,255,0.48));
      border-color: rgba(255,255,255,0.58);
    }

    .label {
      position: relative;
      z-index: 1;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 12px;
    }

    .floral-head {
      position: relative;
      z-index: 3;
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .flower-name {
      font-size: clamp(1.18rem, 2vw, 1.4rem);
      font-weight: 800;
      line-height: 1.3;
    }

    .meaning-line,
    .theme-line {
      font-size: 0.96rem;
      line-height: 1.7;
      color: var(--text-sub);
      font-weight: 600;
    }

    .meaning-line strong,
    .theme-line strong {
      color: var(--text-main);
      font-weight: 800;
    }

    .scent-block {
      position: relative;
      z-index: 1;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.22);
      display: grid;
      gap: 8px;
    }

    .scent-label {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sub);
      font-weight: 800;
    }

    .scent-text {
      margin: 0;
      font-size: 0.96rem;
      line-height: 1.8;
      color: color-mix(in srgb, var(--text-main) 82%, transparent);
    }

    .visual-panel {
      display: grid;
      place-items: center;
    }

    .perfume-stage {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 380px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .mist-layer,
    .inner-mist,
    .petal-burst-layer,
    .screen-petal-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .screen-petal-layer {
      z-index: 4;
      mix-blend-mode: screen;
    }

    .mist,
    .bubble,
    .petal {
      position: absolute;
      border-radius: 999px;
      background: color-mix(in srgb, var(--theme-accent) 26%, rgba(255,255,255,0.42));
      opacity: 0.5;
      filter: blur(1px);
      animation: driftUp linear infinite;
    }

    .bubble {
      background: color-mix(in srgb, rgba(255,255,255,0.76) 56%, var(--theme-accent));
      opacity: 0.58;
      animation: bubbleRise linear infinite;
    }

    .petal {
      width: 12px;
      height: 18px;
      border-radius: 60% 60% 60% 60% / 72% 72% 38% 38%;
      transform: rotate(14deg);
      animation: petalFloat linear infinite;
      opacity: 0.34;
      filter: blur(0.45px);
    }

    .distillery {
      position: relative;
      width: min(308px, 100%);
      height: 100%;
      display: grid;
      place-items: center;
      padding-top: 18px;
    }

    .source-pod {
      position: absolute;
      top: 8px;
      display: grid;
      justify-items: center;
    }

    .source-orb {
      position: relative;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.96), rgba(255,255,255,0.3) 22%, color-mix(in srgb, var(--theme-accent) 52%, transparent) 62%, transparent 74%),
        radial-gradient(circle at 50% 50%, color-mix(in srgb, var(--theme-accent) 28%, rgba(255,255,255,0.22)), transparent 72%);
      box-shadow:
        inset 0 0 24px rgba(255,255,255,0.22),
        0 0 30px color-mix(in srgb, var(--theme-accent) 24%, transparent);
    }

    .source-orb::before,
    .source-orb::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.24);
      animation: pulseRing 4.4s ease-in-out infinite;
    }

    .source-orb::before {
      inset: 10px;
    }

    .source-orb::after {
      inset: -6px;
      opacity: 0.5;
      animation-delay: 1.2s;
    }

    .source-icon {
      position: relative;
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 14px rgba(255,255,255,0.26));
    }

    .source-icon svg {
      width: 46px;
      height: 46px;
      overflow: visible;
    }

    .tube {
      position: absolute;
      top: 92px;
      width: 10px;
      height: 88px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.2);
      overflow: hidden;
      box-shadow: inset 0 0 10px rgba(255,255,255,0.12);
    }

    .flow {
      position: absolute;
      inset: -40% 1px auto;
      height: 46%;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0), color-mix(in srgb, var(--theme-accent) 80%, white 20%), rgba(255,255,255,0));
      filter: blur(0.5px);
      animation: stream 2s linear infinite;
    }

    .flow:nth-child(2) {
      animation-delay: 0.6s;
      opacity: 0.66;
    }

    .flow:nth-child(3) {
      animation-delay: 1.2s;
      opacity: 0.46;
    }

    .drop {
      position: absolute;
      top: 168px;
      width: 12px;
      height: 18px;
      border-radius: 50% 50% 55% 55% / 40% 40% 70% 70%;
      transform: rotate(180deg);
      background: radial-gradient(circle at 45% 34%, rgba(255,255,255,0.9), color-mix(in srgb, var(--theme-accent) 78%, transparent));
      box-shadow: 0 0 18px color-mix(in srgb, var(--theme-accent) 36%, transparent);
      animation: dropFall 2.8s ease-in infinite;
    }

    .drop.drop-2 {
      animation-delay: 1.05s;
      opacity: 0.75;
      transform: translateX(-8px) rotate(180deg) scale(0.88);
    }

    .bottle-wrap {
      position: absolute;
      bottom: 2px;
      width: 252px;
      height: 282px;
      display: grid;
      justify-items: center;
      align-content: start;
      gap: 12px;
    }

    .progress-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.32);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--text-main);
    }

    .bottle {
      position: relative;
      width: 176px;
      height: 228px;
      margin-top: 1px;
    }

    .bottle-cap {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 58px;
      height: 22px;
      border-radius: 10px 10px 8px 8px;
      background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0.14));
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
    }

    .bottle-neck {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 22px;
      border-radius: 0 0 14px 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
      border-left: 1px solid rgba(255,255,255,0.18);
      border-right: 1px solid rgba(255,255,255,0.18);
      border-bottom: 1px solid rgba(255,255,255,0.18);
      z-index: 2;
    }

    .bottle-body {
      position: absolute;
      left: 50%;
      top: 34px;
      transform: translateX(-50%);
      width: 168px;
      height: 188px;
      border-radius: 26px 26px 30px 30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.26), rgba(255,255,255,0.08)),
        linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.24);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        inset 18px 0 22px rgba(255,255,255,0.04),
        inset -12px 0 16px rgba(255,255,255,0.03),
        0 18px 30px rgba(0,0,0,0.14);
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .bottle-body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 16px;
      width: 18px;
      height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.06));
      opacity: 0.74;
      filter: blur(1px);
      pointer-events: none;
      z-index: 3;
    }

    .bottle-body::after {
      content: "";
      position: absolute;
      inset: auto 16px 12px 16px;
      height: 12px;
      border-radius: 999px;
      background: radial-gradient(circle, color-mix(in srgb, var(--theme-accent) 36%, rgba(255,255,255,0.18)), transparent 70%);
      filter: blur(5px);
      opacity: 0.92;
      z-index: 1;
    }

    .liquid {
      position: absolute;
      inset: auto 0 0 0;
      height: var(--liquid-height);
      min-height: 0;
      background:
        linear-gradient(180deg,
          color-mix(in srgb, var(--theme-accent) 56%, rgba(255,255,255,0.7)) 0%,
          color-mix(in srgb, var(--theme-accent) 72%, rgba(255,255,255,0.14)) 36%,
          color-mix(in srgb, var(--theme-secondary) 76%, var(--theme-accent)) 100%);
      transition: height 320ms ease-out, background 820ms ease;
      box-shadow:
        inset 0 8px 18px rgba(255,255,255,0.22),
        inset 0 -16px 24px rgba(0,0,0,0.12),
        0 0 30px color-mix(in srgb, var(--theme-accent) 24%, transparent);
      overflow: hidden;
    }

    .liquid::before,
    .liquid::after {
      content: "";
      position: absolute;
      left: -8%;
      width: 116%;
      border-radius: 44%;
      background: rgba(255,255,255,0.24);
      opacity: 0.58;
    }

    .liquid::before {
      top: -9px;
      height: 20px;
      animation: waveShift 6s linear infinite;
    }

    .liquid::after {
      top: -14px;
      height: 28px;
      opacity: 0.24;
      animation: waveShift 9s linear infinite reverse;
    }

    .liquid-glow {
      position: absolute;
      inset: auto -8% -26% -8%;
      height: 60%;
      background: radial-gradient(circle at 50% 20%, color-mix(in srgb, var(--theme-accent) 28%, rgba(255,255,255,0.18)), transparent 64%);
      filter: blur(8px);
      pointer-events: none;
    }

    .bottle-note {
      width: 100%;
      text-align: center;
      display: grid;
      gap: 4px;
      padding: 0 8px;
    }

    .bottle-note strong {
      font-size: 0.96rem;
      line-height: 1.5;
    }

    .bottle-note span {
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--text-sub);
    }

    .burst-petal {
      position: absolute;
      left: 50%;
      top: 72%;
      width: var(--size, 14px);
      height: calc(var(--size, 14px) * 1.45);
      margin-left: calc(var(--size, 14px) / -2);
      border-radius: 60% 60% 60% 60% / 70% 70% 38% 38%;
      background:
        radial-gradient(circle at 36% 30%, rgba(255,255,255,0.9), transparent 28%),
        var(--petal-color, rgba(255,255,255,0.8));
      opacity: 0;
      transform-origin: center center;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.24));
      animation: burstPetal var(--dur, 2.2s) cubic-bezier(.15,.65,.2,1) forwards;
      animation-delay: var(--delay, 0s);
    }

    .screen-petal {
      position: absolute;
      right: -12%;
      top: var(--top, 50%);
      width: var(--size, 18px);
      height: calc(var(--size, 18px) * 1.35);
      border-radius: 60% 60% 60% 60% / 74% 74% 34% 34%;
      background:
        radial-gradient(circle at 34% 28%, rgba(255,255,255,0.92), transparent 26%),
        var(--petal-color, rgba(255,255,255,0.8));
      opacity: 0;
      transform-origin: center center;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.28));
      animation: screenPetalSweep var(--dur, 4s) cubic-bezier(.2,.62,.15,1) forwards;
      animation-delay: var(--delay, 0s);
      z-index: 2;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(-10px, 14px, 0) scale(1.08); }
    }

    @keyframes driftUp {
      0% { transform: translate3d(0, 18px, 0) scale(0.7); opacity: 0; }
      20% { opacity: 0.5; }
      100% { transform: translate3d(18px, -220px, 0) scale(1.2); opacity: 0; }
    }

    @keyframes bubbleRise {
      0% { transform: translate3d(0, 18px, 0) scale(0.85); opacity: 0; }
      20% { opacity: 0.5; }
      100% { transform: translate3d(10px, -130px, 0) scale(1.15); opacity: 0; }
    }

    @keyframes petalFloat {
      0% { transform: translate3d(0, 20px, 0) rotate(8deg); opacity: 0; }
      15% { opacity: 0.2; }
      100% { transform: translate3d(32px, -250px, 0) rotate(150deg); opacity: 0; }
    }

    @keyframes pulseRing {
      0%, 100% { transform: scale(1); opacity: 0.68; }
      50% { transform: scale(1.08); opacity: 0.22; }
    }

    @keyframes stream {
      0% { transform: translateY(-120%); }
      100% { transform: translateY(260%); }
    }

    @keyframes dropFall {
      0% { transform: translateY(-8px) scale(0.72) rotate(180deg); opacity: 0; }
      18% { opacity: 0.95; }
      74% { opacity: 0.95; }
      100% { transform: translateY(36px) scale(1) rotate(180deg); opacity: 0; }
    }

    @keyframes waveShift {
      0% { transform: translateX(-4%) rotate(0deg); }
      50% { transform: translateX(4%) rotate(-1deg); }
      100% { transform: translateX(-4%) rotate(0deg); }
    }

    @keyframes burstPetal {
      0% {
        opacity: 0;
        transform: translate3d(0, 16px, 0) rotate(0deg) scale(0.55);
      }
      12% {
        opacity: 0.96;
      }
      78% {
        opacity: 0.88;
      }
      100% {
        opacity: 0;
        transform:
          translate3d(var(--x, 0px), calc(var(--y, -180px) + var(--fall, 0px)), 0)
          rotate(var(--rot, 180deg))
          scale(1);
      }
    }

    @keyframes screenPetalSweep {
      0% {
        opacity: 0;
        transform: translate3d(12vw, 12px, 0) rotate(0deg) scale(0.8);
      }
      12% {
        opacity: 0.94;
      }
      62% {
        opacity: 0.82;
      }
      100% {
        opacity: 0;
        transform:
          translate3d(-118vw, var(--driftY, -24px), 0)
          rotate(var(--rot, 300deg))
          scale(1.08);
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 12px 12px calc(28px + env(safe-area-inset-bottom));
      }

      .screen {
        width: min(100%, 720px);
        min-height: calc(100dvh - 24px - env(safe-area-inset-bottom));
        border-radius: 34px 34px 42px 42px;
      }

      .screen::after {
        inset: 10px 10px 14px;
        border-radius: 28px 28px 36px 36px;
      }

      .content {
        position: relative;
        grid-template-columns: 1fr;
        min-height: inherit;
      }

      .panel {
        padding: 24px 18px;
      }

      .info-panel {
        position: relative;
        z-index: 3;

        scent: '基本的に香りが弱い、または無臭の品種が多いですが、一部の原種や交配種はシトラスやバニラのような甘い香りを放ちます。',
        title: 'ナイト・オーキッド',
        primary: '#4b327f',
        secondary: '#1e1b56',
        accent: '#cdbdff',
        icon: { petals: 5, petalColor: '#9571ee', centerColor: '#fff1b3', innerColor: '#ccb8ff', petalLength: 15.8, petalWidth: 8.2, radius: 8.8, rotation: 18 }
      },
      {
        themeName: '紺色',
        themeNameEn: 'Navy',
        colorImage: '静かな時間、休息',
        flower: '白のジャスミン',
        meaning: '愛らしさ、あなたについていく',
        scent: '「香りの王」と称されるほど、濃厚で甘美、かつ非常に華やかなで清潔感があり夕方から夜にかけて香りが強くなる傾向があります。',
        title: 'ネイビー・ジャスミン',
        primary: '#15244f',
        secondary: '#0a1431',
        accent: '#f4f6ff',
        icon: { petals: 7, petalColor: '#fffef8', centerColor: '#ffeab0', innerColor: '#ffffff', petalLength: 13.2, petalWidth: 5.6, radius: 10.8, rotation: 0 }
      },
      {
        themeName: '深夜の闇',
        themeNameEn: 'Darkness',
        colorImage: '終わり、深いリラックス',
        flower: '月見草',
        meaning: '無言の愛情、ほのかな恋',
        scent: 'ほのかな甘さとフルーティーさが香りが特徴です。青い花びらが最も有名で、見た目にも美しく、優雅で華やかな印象を与えます。',
        title: 'ダーク・ムーンフラワー',
        primary: '#090b12',
        secondary: '#1b2032',
        accent: '#b8c7f7',
        icon: { petals: 4, petalColor: '#fff6cf', centerColor: '#f2d97a', innerColor: '#fff8e0', petalLength: 15, petalWidth: 8.4, radius: 8.4, rotation: 45 }
      }
    ];

    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    const weekdayEl = document.getElementById('weekday');
    const flowerNameEl = document.getElementById('flowerName');
    const flowerMeaningEl = document.getElementById('flowerMeaning');
    const colorNameEl = document.getElementById('colorName');
    const flowerScentEl = document.getElementById('flowerScent');
    const sourceIconEl = document.getElementById('sourceIcon');
    const progressTextEl = document.getElementById('progressText');
    const bottleTitleEl = document.getElementById('bottleTitle');
    const bottleSubEl = document.getElementById('bottleSub');
    const innerMistEl = document.getElementById('innerMist');
    const mistLayerEl = document.getElementById('mistLayer');
    const petalBurstLayerEl = document.getElementById('petalBurstLayer');
    const screenPetalLayerEl = document.getElementById('screenPetalLayer');

    const weekdays = ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'];
    const tenMinuteMs = 10 * 60 * 1000;
    const warmBase = '#ffe0c7';
    const warmDeep = '#f4c4a0';

    let lastHour = -1;
    let lastSecond = -1;
    let lastBottleCycle = -1;
    let lastThemeIndex = new Date().getHours();

    function pad(num) {
      return String(num).padStart(2, '0');
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(num, min, max) {
      return Math.min(max, Math.max(min, num));
    }

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      const expanded = clean.length === 3 ? clean.split('').map((c) => c + c).join('') : clean;
      const bigint = parseInt(expanded, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255
      };
    }

    function rgbToHex({ r, g, b }) {
      const toHex = (n) => Math.round(clamp(n, 0, 255)).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function mixHex(a, b, weight) {
      const colorA = hexToRgb(a);
      const colorB = hexToRgb(b);
      const w = clamp(weight, 0, 1);
      return rgbToHex({
        r: colorA.r * (1 - w) + colorB.r * w,
        g: colorA.g * (1 - w) + colorB.g * w,
        b: colorA.b * (1 - w) + colorB.b * w
      });
    }

    function getLuminance(hex) {
      const { r, g, b } = hexToRgb(hex);
      return (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
    }

    function getNightStrength(hour) {
      if (hour <= 3) return 0.86;
      if (hour === 4) return 0.74;
      if (hour === 5) return 0.56;
      if (hour === 6) return 0.34;
      if (hour <= 16) return 0.08;
      if (hour === 17) return 0.18;
      if (hour === 18) return 0.38;
      if (hour === 19) return 0.54;
      if (hour === 20) return 0.68;
      if (hour === 21) return 0.76;
      if (hour === 22) return 0.84;
      return 0.9;
    }

    function applyTheme(theme, hour) {
      const root = document.documentElement;
      root.style.setProperty('--theme-primary', theme.primary);
      root.style.setProperty('--theme-secondary', theme.secondary);
      root.style.setProperty('--theme-accent', theme.accent);

      const nightStrength = getNightStrength(hour);
      const pageBg = mixHex(warmBase, theme.primary, nightStrength);
      const pageDeep = mixHex(warmDeep, theme.secondary, clamp(nightStrength + 0.08, 0.12, 0.96));

      root.style.setProperty('--page-bg', pageBg);
      root.style.setProperty('--page-bg-deep', pageDeep);

      const referenceColor = mixHex(pageBg, theme.primary, 0.3);
      const luminance = getLuminance(referenceColor);
      const mainText = luminance > 0.6 ? '#2b211c' : '#f9f6f0';
      const subText = luminance > 0.6 ? 'rgba(43, 33, 28, 0.72)' : 'rgba(249, 246, 240, 0.76)';
      const border = luminance > 0.6 ? 'rgba(255,255,255,0.30)' : 'rgba(255,255,255,0.14)';
      const shadow = luminance > 0.6 ? '0 24px 60px rgba(118, 77, 46, 0.16)' : '0 26px 70px rgba(0, 0, 0, 0.34)';

      root.style.setProperty('--text-main', mainText);
      root.style.setProperty('--text-sub', subText);
      root.style.setProperty('--border', border);
      root.style.setProperty('--shadow', shadow);

      flowerNameEl.textContent = theme.flower;
      flowerMeaningEl.textContent = theme.meaning;
      colorNameEl.textContent = `${theme.themeName} (${theme.themeNameEn})`;
      flowerScentEl.textContent = theme.scent;
      bottleTitleEl.textContent = theme.title;
      bottleSubEl.textContent = `10分かけて「${theme.flower}」の香りが満ち、満了の瞬間に花びらが画面をやわらかく横切ります。`;

      renderSourceIcon(theme);
      rebuildMist(mistLayerEl, 18, false, theme);
      rebuildMist(innerMistEl, 12, true, theme);
    }

    function renderSourceIcon(theme) {
      const icon = theme.icon;
      const petals = [];
      const count = icon.petals || 6;
      const rotationOffset = icon.rotation || 0;
      const radius = icon.radius || 10;
      const petalLength = icon.petalLength || 13;
      const petalWidth = icon.petalWidth || 6;

      for (let i = 0; i < count; i++) {
        const angle = (360 / count) * i + rotationOffset;
        const extraScale = 0.92 + (i % 2) * 0.08;
        petals.push(`
          <ellipse
            cx="23"
            cy="${23 - radius}"
            rx="${petalWidth * extraScale}"
            ry="${petalLength * extraScale}"
            fill="${icon.petalColor}"
            transform="rotate(${angle} 23 23)"
            opacity="${0.94 - (i % 3) * 0.08}"
          />
        `);
      }

      sourceIconEl.innerHTML = `
        <svg viewBox="0 0 46 46" role="img" aria-label="${theme.flower}">
          <defs>
            <radialGradient id="flowerCore" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="${icon.innerColor || '#ffffff'}" />
              <stop offset="100%" stop-color="${icon.centerColor || '#fff2c8'}" />
            </radialGradient>
          </defs>
          ${petals.join('')}
          <circle cx="23" cy="23" r="7.2" fill="url(#flowerCore)" />
          <circle cx="23" cy="23" r="3.1" fill="${icon.centerColor || '#fff2c8'}" opacity="0.9" />
        </svg>
      `;
    }

    function rebuildMist(container, count, inner, theme) {
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const node = document.createElement('span');
        const selector = inner ? (i % 4 === 0 ? 'petal' : 'bubble') : (i % 5 === 0 ? 'petal' : 'mist');
        node.className = selector;
        const size = inner
          ? (selector === 'petal' ? rand(8, 14) : rand(4, 10))
          : (selector === 'petal' ? rand(10, 16) : rand(10, 24));
        const left = inner ? rand(8, 88) : rand(0, 100);
        const bottom = inner ? rand(-4, 10) : rand(-10, 80);
        const duration = inner ? rand(3.6, 7.4) : rand(6.6, 13.2);
        const delay = rand(-duration, 0);

        node.style.width = `${size}px`;
        node.style.height = selector === 'petal' ? `${size * 1.4}px` : `${size}px`;
        node.style.left = `${left}%`;
        node.style.bottom = `${bottom}px`;
        node.style.animationDuration = `${duration}s`;
        node.style.animationDelay = `${delay}s`;
        node.style.opacity = selector === 'petal' ? rand(0.14, 0.34) : rand(0.2, 0.58);

        if (selector === 'petal') {
          node.style.background = `
            radial-gradient(circle at 35% 28%, rgba(255,255,255,0.92), transparent 26%),
            ${theme.icon?.petalColor || theme.accent}
          `;
        }

        container.appendChild(node);
      }
    }

    function emitPetalBurst(theme) {
      const localBurstCount = 16;
      for (let i = 0; i < localBurstCount; i++) {
        const petal = document.createElement('span');
        petal.className = 'burst-petal';

        const size = rand(9, 16);
        const x = rand(-110, 110);
        const y = rand(-170, -90);
        const fall = rand(18, 54);
        const rot = rand(120, 380) * (Math.random() > 0.5 ? 1 : -1);
        const dur = rand(1.8, 2.6);
        const delay = rand(0, 0.12);

        petal.style.setProperty('--size', `${size}px`);
        petal.style.setProperty('--x', `${x}px`);
        petal.style.setProperty('--y', `${y}px`);
        petal.style.setProperty('--fall', `${fall}px`);
        petal.style.setProperty('--rot', `${rot}deg`);
        petal.style.setProperty('--dur', `${dur}s`);
        petal.style.setProperty('--delay', `${delay}s`);
        petal.style.setProperty('--petal-color', theme.icon?.petalColor || theme.accent);

        petalBurstLayerEl.appendChild(petal);
        setTimeout(() => petal.remove(), (dur + delay + 0.2) * 1000);
      }

      const screenCount = window.innerWidth <= 760 ? 32 : 48;
      for (let i = 0; i < screenCount; i++) {
        const petal = document.createElement('span');
        petal.className = 'screen-petal';

        const size = rand(12, 24);
        const top = rand(10, 86);
        const driftY = rand(-40, 34);
        const rot = rand(180, 520) * (Math.random() > 0.5 ? 1 : -1);
        const dur = rand(3.4, 5.4);
        const delay = rand(0, 0.85);

        petal.style.setProperty('--size', `${size}px`);
        petal.style.setProperty('--top', `${top}%`);
        petal.style.setProperty('--driftY', `${driftY}px`);
        petal.style.setProperty('--rot', `${rot}deg`);
        petal.style.setProperty('--dur', `${dur}s`);
        petal.style.setProperty('--delay', `${delay}s`);
        petal.style.setProperty('--petal-color', theme.icon?.petalColor || theme.accent);

        screenPetalLayerEl.appendChild(petal);
        setTimeout(() => petal.remove(), (dur + delay + 0.3) * 1000);
      }
    }

    function tick() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();
      const theme = themes[h];
      const bottleCycle = Math.floor(now.getTime() / tenMinuteMs);

      if (lastBottleCycle !== -1 && bottleCycle !== lastBottleCycle) {
        emitPetalBurst(themes[lastThemeIndex] || theme);
      }
      lastBottleCycle = bottleCycle;

      if (lastHour !== h) {
        applyTheme(theme, h);
        lastHour = h;
      }

      if (lastSecond !== s) {
        timeEl.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
        dateEl.textContent = `${now.getFullYear()}/${pad(now.getMonth() + 1)}/${pad(now.getDate())}`;
        weekdayEl.textContent = weekdays[now.getDay()];
        lastSecond = s;
      }

      const minutesInBottle = m % 10;
      const elapsedMs = (minutesInBottle * 60 * 1000) + (s * 1000) + ms;
      const bottleProgress = clamp(elapsedMs / tenMinuteMs, 0, 1);
      const progressPercent = bottleProgress >= 0.995 ? 100 : Math.floor(bottleProgress * 100);
      document.documentElement.style.setProperty('--liquid-height', `${(bottleProgress * 100).toFixed(2)}%`);
      progressTextEl.textContent = `ボトル充填 ${progressPercent}%`;

      lastThemeIndex = h;
      requestAnimationFrame(tick);
    }

    const initialHour = new Date().getHours();
    applyTheme(themes[initialHour], initialHour);
    requestAnimationFrame(tick);
  </script>
</body>
</html>
